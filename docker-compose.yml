services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: market_twin
      POSTGRES_USER: market_twin
      POSTGRES_PASSWORD: market_twin_local
    volumes:
      - market_twin_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market_twin -d market_twin"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql+psycopg://market_twin:market_twin_local@db:5432/market_twin
      JWT_SECRET_KEY: local-development-secret-change-before-deploy
      ADMIN_API_KEY: local-admin-key-change-before-deploy
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
        NEXT_PUBLIC_SALES_URL: ${NEXT_PUBLIC_SALES_URL:-https://lazzor.com}
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  market_twin_db:
